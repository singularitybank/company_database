# ============================================================
# 企業情報データベース 設定ファイル
# ============================================================

# ------------------------------------------------------------
# ハローワーク
# ------------------------------------------------------------
hellowork:
  # 生HTML保存先（Cドライブ一時置き。定期的に外付けHDDへ手動移動）
  html_dir: "C:/Temp/html"

  # Parquet保存先（プロジェクトルートからの相対パス）
  staging_dir: "data/staging"

  # 求人番号収集時の一時CSV置き場
  temp_dir: "C:/Temp"

  # 求人番号CSV最終保存先（OneDrive）
  output_dir: "C:/Users/singu/OneDrive - Singularity Bank/Development/Data/hellowork"

  # アクセス間隔（秒）。実際にはこの値 + random.uniform(0, 1) 秒待機する
  wait_between_pages: 2.0
  wait_between_details: 1.0

  # Selenium タイムアウト（秒）
  timeout: 15

  # ブラウザをヘッドレスモードで起動するか
  headless: false

# ------------------------------------------------------------
# PR Times
# ------------------------------------------------------------
prtimes:
  # グローバルRSS URL
  rss_url: "https://prtimes.jp/index.rdf"

  # 生HTML保存先（記事・企業ページ）
  html_dir: "C:/Temp/html/prtimes"

  # DB保存先
  db_path: "data/prtimes.db"

  # リクエスト間隔（秒）。実際にはこの値 + random.uniform(0, 1) 秒待機する
  wait_between_articles: 1.0
  wait_between_companies: 1.5

  # タイムアウト（秒）
  timeout: 30

  # リトライ回数
  retry_count: 3

# ------------------------------------------------------------
# 倒産情報（TDB / TSR）
# ------------------------------------------------------------
bankruptcy:
  # TDB RSS URL
  tdb_rss_url: "https://www.tdb.co.jp/rss/jouhou.rdf"

  # TSR RSS URL
  tsr_rss_url: "https://www.tsr-net.co.jp/rss/news_flash.xml"

  # 生HTML保存先
  html_dir: "C:/Temp/html/bankruptcy"

  # DB保存先
  db_path: "data/bankruptcy.db"

  # リクエスト間隔（秒）。実際には random.uniform(この値, この値 × 2.5) 秒待機する
  wait_between_requests: 10.0

  # タイムアウト（秒）
  timeout: 30

  # リトライ回数
  retry_count: 3

  # ブラウザをヘッドレスモードで起動するか（Selenium fallback 用）
  headless: false

  # 名寄せ：突合対象とする公開日前後の日数
  match_window_days: 14

  # 名寄せ：確定マッチの閾値（点）
  match_threshold_confirmed: 85

  # 名寄せ：候補登録の下限閾値（点）
  match_threshold_candidate: 70

# ------------------------------------------------------------
# ニュース（通常RSS 10ソース）
# ------------------------------------------------------------
news:
  db_path: "data/news.db"
  sources:
    - { key: nhk,              display_name: "NHK社会",       url: "https://www.nhk.or.jp/rss/news/cat1.xml",                   category: domestic }
    - { key: 47news_national,  display_name: "47NEWS全国社会", url: "https://assets.wor.jp/rss/rdf/ynnews/national.rdf",         category: domestic }
    - { key: 47news_local,     display_name: "47NEWS地域社会", url: "https://assets.wor.jp/rss/rdf/ynlocalnews/national.rdf",    category: local    }
    - { key: yahoo_domestic,   display_name: "Yahoo国内",      url: "https://news.yahoo.co.jp/rss/categories/domestic.xml",      category: domestic }
    - { key: yahoo_local,      display_name: "Yahoo地域",      url: "https://news.yahoo.co.jp/rss/categories/local.xml",         category: local    }
    - { key: nikkei_society,   display_name: "日経社会",       url: "https://assets.wor.jp/rss/rdf/nikkei/society.rdf",          category: domestic }
    - { key: nikkei_local,     display_name: "日経地域",       url: "https://assets.wor.jp/rss/rdf/nikkei/local.rdf",            category: local    }
    - { key: sankei_affairs,   display_name: "産経社会",       url: "https://assets.wor.jp/rss/rdf/sankei/affairs.rdf",          category: domestic }
    - { key: yomiuri_national, display_name: "読売社会",       url: "https://assets.wor.jp/rss/rdf/yomiuri/national.rdf",        category: domestic }
    - { key: asahi_national,   display_name: "朝日社会",       url: "https://www.asahi.com/rss/asahi/national.rdf",              category: domestic }
  night_skip:
    enabled: true
    start_hour: 22
    end_hour: 7
  request:
    timeout: 30
    retry_count: 3
    wait_between_sources: 2.0

# ------------------------------------------------------------
# Google News キーワード収集
# ------------------------------------------------------------
google_news:
  db_path: "data/google_news.db"
  base_url: "https://news.google.com/rss/search"
  params:
    hl: "ja"
    gl: "JP"
    ceid: "JP:ja"
  night_skip:
    enabled: true
    start_hour: 22
    end_hour: 7
  request:
    timeout: 30
    retry_count: 3
    wait_between_keywords: 3.0
