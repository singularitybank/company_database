# ============================================================
# 企業情報データベース 設定ファイル
# ============================================================

# ------------------------------------------------------------
# ハローワーク
# ------------------------------------------------------------
hellowork:
  # 生HTML保存先（Cドライブ一時置き。定期的に外付けHDDへ手動移動）
  html_dir: "C:/Temp/html"

  # Parquet保存先（プロジェクトルートからの相対パス）
  staging_dir: "data/staging"

  # 求人番号収集時の一時CSV置き場
  temp_dir: "C:/Temp"

  # 求人番号CSV最終保存先（OneDrive）
  output_dir: "C:/Users/singu/OneDrive - Singularity Bank/Development/Data/hellowork"

  # アクセス間隔（秒）。実際にはこの値 + random.uniform(0, 1) 秒待機する
  wait_between_pages: 2.0
  wait_between_details: 1.0

  # Selenium タイムアウト（秒）
  timeout: 15

  # ブラウザをヘッドレスモードで起動するか
  headless: false

# ------------------------------------------------------------
# PR Times
# ------------------------------------------------------------
prtimes:
  # グローバルRSS URL
  rss_url: "https://prtimes.jp/index.rdf"

  # 生HTML保存先（記事・企業ページ）
  html_dir: "C:/Temp/html/prtimes"

  # DB保存先
  db_path: "data/prtimes.db"

  # リクエスト間隔（秒）。実際にはこの値 + random.uniform(0, 1) 秒待機する
  wait_between_articles: 1.0
  wait_between_companies: 1.5

  # タイムアウト（秒）
  timeout: 30

  # リトライ回数
  retry_count: 3

# ------------------------------------------------------------
# 倒産情報（TDB / TSR）
# ------------------------------------------------------------
bankruptcy:
  # TDB RSS URL
  tdb_rss_url: "https://www.tdb.co.jp/rss/jouhou.rdf"

  # TSR RSS URL
  tsr_rss_url: "https://www.tsr-net.co.jp/rss/news_flash.xml"

  # 生HTML保存先
  html_dir: "C:/Temp/html/bankruptcy"

  # DB保存先
  db_path: "data/bankruptcy.db"

  # リクエスト間隔（秒）。実際にはこの値 + random.uniform(0, 1) 秒待機する
  wait_between_requests: 3.0

  # タイムアウト（秒）
  timeout: 30

  # リトライ回数
  retry_count: 3

  # 名寄せ：突合対象とする公開日前後の日数
  match_window_days: 14

  # 名寄せ：確定マッチの閾値（点）
  match_threshold_confirmed: 85

  # 名寄せ：候補登録の下限閾値（点）
  match_threshold_candidate: 70
